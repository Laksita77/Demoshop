<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DemoShop AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a4731 0%, #2d6a4f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .chatbot-container {
      width: 100%;
      max-width: 600px;
      height: 80vh;
      max-height: 700px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chatbot-header {
      background: linear-gradient(135deg, #1a4731 0%, #2d6a4f 100%);
      color: white;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #74c69d;
    }

    .chatbot-header h1 {
      font-size: 1.5rem;
      margin-bottom: 5px;
    }

    .chatbot-header p {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }

    .message {
      margin-bottom: 15px;
      display: flex;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.bot {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
      line-height: 1.4;
      font-size: 0.95rem;
    }

    .user .message-bubble {
      background: #1a4731;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot .message-bubble {
      background: #e8f5e9;
      color: #222;
      border-bottom-left-radius: 4px;
      border: 1px solid #c8e6c9;
    }

    .bot.loading .message-bubble {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1a4731;
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }

    .input-area {
      padding: 15px;
      background: white;
      border-top: 2px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-area input:focus {
      border-color: #1a4731;
    }

    .input-area input:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }

    .send-btn {
      background: #1a4731;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
      white-space: nowrap;
    }

    .send-btn:hover:not(:disabled) {
      background: #2d6a4f;
    }

    .send-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px 16px;
      border-radius: 6px;
      border-left: 4px solid #c62828;
      margin-bottom: 10px;
    }

    .info-text {
      text-align: center;
      color: #666;
      padding: 20px;
      font-size: 0.9rem;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="chatbot-container">
    <div class="chatbot-header">
      <h1>🤖 DemoShop AI Assistant</h1>
      <p>Powered by Gemini AI</p>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="info-text">
        <p>👋 Welcome to DemoShop AI Assistant!</p>
        <p style="margin-top: 10px; font-size: 0.85rem; color: #999;">
          Ask me anything about testing, bug classification, code review, or e-commerce best practices.
        </p>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Ask me something..."
        onkeypress="handleKeyPress(event)"
      >
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesContainer = document.getElementById('messagesContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      // Clear input
      userInput.value = '';
      userInput.focus();

      // Add user message
      addMessage(message, 'user');

      // Disable send button
      sendBtn.disabled = true;
      userInput.disabled = true;

      // Show loading
      const loadingId = addLoadingMessage();

      try {
        // Send to server
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const data = await response.json();

        // Remove loading
        document.getElementById(loadingId)?.remove();

        // Add bot response
        addMessage(data.reply, 'bot');
      } catch (error) {
        console.error('Error:', error);
        document.getElementById(loadingId)?.remove();
        addMessage(`❌ Error: ${error.message}. Please try again.`, 'bot error');
      }

      // Enable send button
      sendBtn.disabled = false;
      userInput.disabled = false;
    }

    function addMessage(text, sender) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;

      messageDiv.appendChild(bubble);
      messagesContainer.appendChild(messageDiv);

      // Scroll to bottom
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      return messageDiv.id = `msg-${Date.now()}`;
    }

    function addLoadingMessage() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message bot loading';
      const id = `loading-${Date.now()}`;
      messageDiv.id = id;

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = `
        <div class="typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;

      messageDiv.appendChild(bubble);
      messagesContainer.appendChild(messageDiv);

      // Scroll to bottom
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      return id;
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // Focus on load
    window.addEventListener('load', () => userInput.focus());
  </script>
</body>
</html>
